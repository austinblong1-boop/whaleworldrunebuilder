<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>WhaleWorld Rune Builder</title>
<style>
:root{--bg:#0f172a;--panel:#111827;--panel2:#1f2937;--line:#334155;--text:#e5eefb;--muted:#94a3b8;--accent:#38bdf8;--normal:#9ca3af;--fine:#4ade80;--rare:#60a5fa;--epic:#a78bfa;--legendary:#facc15;--mythic:#fb7185}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px/1.45 Inter,system-ui,sans-serif}
.wrap{max-width:1200px;margin:0 auto;padding:16px}.hero{padding:16px;border:1px solid var(--line);border-radius:18px;background:var(--panel);margin-bottom:14px}.sub{color:var(--muted);margin-top:4px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.panel{border:1px solid var(--line);border-radius:16px;background:var(--panel);overflow:hidden}.head{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}.body{padding:14px}.slot-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.slot{padding:10px;border:1px solid var(--line);border-radius:12px;background:var(--panel2)}.label{font-size:12px;color:var(--muted);margin-bottom:4px}.title{font-weight:800;margin-bottom:8px}
select{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0b1220;color:var(--text);margin-bottom:8px}
.pill{display:inline-block;padding:4px 8px;border-radius:999px;border:1px solid currentColor;font-size:12px;font-weight:700}
.Normal{color:var(--normal)} .Fine{color:var(--fine)} .Rare{color:var(--rare)} .Epic{color:var(--epic)} .Legendary{color:var(--legendary)} .Mythic{color:var(--mythic)}
.summary{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}.item{padding:10px;border:1px solid var(--line);border-radius:10px;background:var(--panel2);margin-bottom:8px}.small{font-size:12px;color:var(--muted)}
@media (max-width:900px){.grid,.slot-grid,.summary{grid-template-columns:1fr}}
</style>
</head>

    <div class="sub">Flow is now exactly: Rune > Quality > Enchant. The enchant dropdown only shows rune-specific enchants for that quality plus the shared category enchants like boss/minion lines.</div>
  </div>
  <div class="grid" id="sections"></div>
  <div class="summary">
    <div class="panel"><div class="head"><h3>Selected Enchants</h3><div class="small" id="selectedCount">0 chosen</div></div><div class="body" id="selected"></div></div>
    <div class="panel"><div class="head"><h3>Total Benefit</h3><div class="small">Stacked stats + separate effects</div></div><div class="body"><div id="totals"></div><div style="height:8px"></div><div id="effects"></div></div></div>

gendary": ["Strike DMG+15%", "Strike CRIT Rate+15%", "Warfire Dragon chance"], "Mythic": ["Strike DMG+30%", "Strike CRIT Rate+30%", "High Warfire Dragon chance"]}, "Ricochet Strike": {"Normal": ["Strike DMG+40"], "Fine": ["Strike DMG+80"], "Rare": ["Strike DMG+160", "Strike CRIT Rate+2%"], "Epic": ["Strike DMG+480", "Strike CRIT Rate+6%"], "Legendary": ["Strike DMG+15%", "Strike CRIT Rate+15%", "Strike Bounce +2"], "Mythic": ["Strike DMG+30%", "Strike CRIT Rate+30%", "Strike Bounce +4"]}, "Rootguard": {"Normal": ["Plant DMG+40"], "Fine": ["Plant DMG+80"], "Rare": ["Plant DMG+160", "Plant CRIT Rate+2%"], "Epic": ["Plant DMG+480", "Plant CRIT Rate+6%"], "Legendary": ["Plant DMG+15%", "Plant CRIT Rate+15%", "Fatal damage negate once"], "Mythic": ["Plant DMG+30%", "Plant CRIT Rate+30%", "Fatal damage negate up to 3 times"]}, "Vine Bind": {"Normal": ["Plant DMG+40"], "Fine": ["Plant DMG+80"], "Rare": ["Plant DMG+160", "Plant CRIT Rate+2%"], "Epic": ["Plant DMG+480", "Plant CRIT Rate+6%"], "Legendary": ["Plant DMG+15%", "Plant CRIT Rate+15%", "Plant DOT and slow"], "Mythic": ["Plant DMG+30%", "Plant CRIT Rate+30%", "Plant DOT, slow, small Root chance"]}}, "Ability": {"Arrow Rain": {"Normal": ["Main Weapon DMG+40"], "Fine": ["Main Weapon DMG+80"], "Rare": ["Main Weapon DMG+160", "Main Weapon CRIT DMG+2%"], "Epic": ["Main Weapon DMG+480", "Main Weapon CRIT DMG+6%"], "Legendary": ["Main Weapon DMG+15%", "Main Weapon CRIT DMG+15%", "Weaken chance for 2s"], "Mythic": ["Main Weapon DMG+30%", "Main Weapon CRIT DMG+30%", "Weaken for 2s"]}, "Flamenox Touch": {"Normal": ["Elemental DMG+40"], "Fine": ["Elemental DMG+80"], "Rare": ["Elemental DMG+160", "Elemental CRIT DMG+2%"], "Epic": ["Elemental DMG+480", "Elemental CRIT DMG+6%"], "Legendary": ["Elemental DMG+15%", "Elemental CRIT DMG+15%", "Meteor chance on trigger"], "Mythic": ["Elemental DMG+30%", "Elemental CRIT DMG+30%", "Meteor on trigger"]}, "Frostshock Touch": {"Normal": ["Elemental DMG+40"], "Fine": ["Elemental DMG+80"], "Rare": ["Elemental DMG+160", "Elemental CRIT DMG+2%"], "Epic": ["Elemental DMG+480", "Elemental CRIT DMG+6%"], "Legendary": ["Elemental DMG+15%", "Elemental CRIT DMG+15%", "1-3 Strikes chance on trigger"], "Mythic": ["Elemental DMG+30%", "Elemental CRIT DMG+30%", "1-3 Strikes on trigger"]}, "Ring of Agony": {"Normal": ["Circle DMG+40"], "Fine": ["Circle DMG+80"], "Rare": ["Circle DMG+160", "Circle CRIT DMG+2%"], "Epic": ["Circle DMG+480", "Circle CRIT DMG+6%"], "Legendary": ["Circle DMG+15%", "Circle CRIT DMG+15%", "Enemies -10% ATK inside ring"], "Mythic": ["Circle DMG+30%", "Circle CRIT DMG+30%", "Enemies -20% ATK inside ring"]}, "Circle": {"Normal": ["Circle DMG+40"], "Fine": ["Circle DMG+80"], "Rare": ["Circle DMG+160", "Circle CRIT DMG+2%"], "Epic": ["Circle DMG+480", "Circle CRIT DMG+6%"], "Legendary": ["Circle DMG+15%", "Circle CRIT DMG+15%", "Shield chance"], "Mythic": ["Circle DMG+30%", "Circle CRIT DMG+30%", "Higher shield chance"]}, "Star of Fury": {"Normal": ["Meteor DMG+40"], "Fine": ["Meteor DMG+80"], "Rare": ["Meteor DMG+160", "Meteor CRIT DMG+2%"], "Epic": ["Meteor DMG+480", "Meteor CRIT DMG+6%"], "Legendary": ["Meteor DMG+15%", "Meteor CRIT DMG+15%", "Huge Meteor chance"], "Mythic": ["Meteor DMG+30%", "Meteor CRIT DMG+30%", "Huge Meteors"]}, "Star of Time": {"Normal": ["Meteor DMG+40"], "Fine": ["Meteor DMG+80"], "Rare": ["Meteor DMG+160", "Meteor CRIT DMG+2%"], "Epic": ["Meteor DMG+480", "Meteor CRIT DMG+6%"], "Legendary": ["Meteor DMG+15%", "Meteor CRIT DMG+15%", "CRIT Rate up and 1-3 Strikes chance"], "Mythic": ["Meteor DMG+30%", "Meteor CRIT DMG+30%", "Big CRIT Rate up and 1-3 Strikes"]}, "Healing Sprite": {"Normal": ["Sprite DMG+40"], "Fine": ["Sprite DMG+80"], "Rare": ["Sprite DMG+160", "Sprite CRIT DMG+2%"], "Epic": ["Sprite DMG+480", "Sprite CRIT DMG+6%"], "Legendary": ["Sprite DMG+15%", "Sprite CRIT DMG+15%", "Higher CRIT Rate at full HP"], "Mythic": ["Sprite DMG+30%", "Sprite CRIT DMG+30%", "Greatly higher CRIT Rate at full HP"]}, "Melee S const state = {slots:[]};

function init(){
  for(const [type,count] of DATA.slotOrder){
    for(let i=1;i<=count;i++){
      state.slots.push({id:`${type}-${i}`, type, index:i, rune:"", quality:"", enchant:""});
    }
  }
  render();
}
function getSlot(id){ return state.slots.find(s=>s.id===id); }
function uniq(a){ return [...new Set(a)]; }
function getEnchantOptions(type,rune,quality){
  if(type==="Etched" || !rune || !quality) return [];
  const shared=((DATA.shared[type]||{})[quality]||[]);
  const specific=((((DATA.specific[type]||{})[rune]||{})[quality])||[]);
  return uniq([...shared, ...specific]);
}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function render(){
  const sections=document.getElementById("sections");
  sections.innerHTML="";
  for(const [type,count] of DATA.slotOrder){
    const panel=document.createElement("div");
    panel.className="panel";
    panel.innerHTML=`<div class="head"><h3>${type} (${count})</h3><div class="small">Rune > Quality > Enchant</div></div><div class="body"><div class="slot-grid" id="wrap-${type}"></div></div>`;
    sections.appendChild(panel);
    const wrap=panel.querySelector(`#wrap-${type}`);
    state.slots.filter(s=>s.type===type).forEach(slot=>{
      const runeOptions=['<option value="">Select rune</option>', ...DATA.runes[type].map(r=>`<option value="${esc(r)}" ${slot.rune===r?'selected':''}>${esc(r)}</option>`)].join("");
      const qualityOptions=['<option value="">Select quality</option>', ...DATA.qualities.map(q=>`<option value="${q}" ${slot.quality===q?'selected':''}>${q}</option>`)].join("");
      const enchants=getEnchantOptions(type, slot.rune, slot.quality);
      const enchantOptions=['<option value="">Select enchant</option>', ...enchants.map(e=>`<option value="${esc(e)}" ${slot.enchant===e?'selected':''}>${esc(e)}</option>`)].join("");
      const slotDiv=document.createElement("div");
      slotDiv.className="slot";
      slotDiv.innerHTML=`
        <div class="title">${type} ${slot.index}</div>
        <div class="label">Rune</div>
        <select data-kind="rune" data-id="${slot.id}">${runeOptions}</select>
        <div class="label">Quality</div>
        <select data-kind="quality" data-id="${slot.id}">${qualityOptions}</select>
        <div class="label">Enchant</div>
        ${type==="Etched"
          ? `<div class="small">Etched has no separate enchant table in this build.</div>`
          : `<select data-kind="enchant" data-id="${slot.id}" ${(slot.rune && slot.quality)?'':'disabled'}>${enchantOptions}</select>
             <div class="small">${slot.rune && slot.quality ? 'Filtered to shared + rune-specific enchants for this quality.' : 'Pick rune and quality first.'}</div>`}
        ${slot.quality ? `<div style="margin-top:8px"><span class="pill ${slot.quality}">${slot.quality}</span></div>`:''}
      `;
      wrap.appendChild(slotDiv);
    });
  }

  document.querySelectorAll("select[data-kind='rune']").forEach(sel=>sel.onchange=e=>{
    const slot=getSlot(e.target.dataset.id);
    slot.rune=e.target.value;
    slot.enchant="";
    render();
  });
  document.querySelectorAll("select[data-kind='quality']").forEach(sel=>sel.onchange=e=>{
    const slot=getSlot(e.target.dataset.id);
    slot.quality=e.target.value;
    slot.enchant="";
    render();
  });
  document.querySelectorAll("select[data-kind='enchant']").forEach(sel=>sel.onchange=e=>{
    const slot=getSlot(e.target.dataset.id);
    slot.enchant=e.target.value;
    renderSummary();
  });

  renderSummary();
}
function parseNumeric(text){
  const out=[];
  if(!text) return out;
  for(const part of text.split(",").map(x=>x.trim()).filter(Boolean)){
    let m=part.match(/^(.*?)([+-]\d+(?:\.\d+)?%?)\b/);
    if(m){
      const label=m[1].trim().replace(/[:\-]+$/,'').trim();
      if(label) out.push({label,value:m[2],raw:part});
      continue;
    }
    let c=part.match(/to\s+([+-]?\d+(?:\.\d+)?%?)\s+(.+)$/i);
    if(c) out.push({label:c[2].trim(),value:c[1],raw:part});
  }
  return out;
}
function nval(v){const n=parseFloat(String(v).replace("%","")); return isNaN(n)?0:n}
function suf(v){return String(v).includes("%")?"%":""}
function renderSummary(){
  const selected=state.slots.filter(s=>s.enchant);
  document.getElementById("selectedCount").textContent=`${selected.length} chosen`;
  document.getElementById("selected").innerHTML = selected.length
    ? selected.map(s=>`<div class="item"><strong>${s.type} ${s.index}</strong><div class="small">${esc(s.rune)} • ${esc(s.quality)}</div><div style="margin-top:6px">${esc(s.enchant)}</div></div>`).join("")
    : `<div class="item">No enchants selected yet.</div>`;

  const totals={}, effects=[];
  selected.forEach(s=>{
    const parts=parseNumeric(s.enchant);
    if(!parts.length){effects.push({slot:`${s.type} ${s.index}`, text:s.enchant, quality:s.quality}); return;}
    parts.forEach(p=>{
      if(!totals[p.label]) totals[p.label]={label:p.label,val:0,suffix:suf(p.value)};
      totals[p.label].val += nval(p.value);
    });
  });

  const totalRows=Object.values(totals).sort((a,b)=>a.label.localeCompare(b.label));
  document.getElementById("totals").innerHTML = totalRows.length
    ? totalRows.map(t=>`<div class="item"><strong>${esc(t.label)}</strong><div class="small">+${Number.isInteger(t.val)?t.val:t.val.toFixed(1)}${t.suffix}</div></div>`).join("")
    : `<div class="item">No stacked numeric totals yet.</div>`;

  document.getElementById("effects").innerHTML = effects.length
    ? effects.map(e=>`<div class="item"><strong>${esc(e.slot)}</strong><div>${esc(e.text)}</div><div style="margin-top:6px"><span class="pill ${e.quality||'Normal'}">${esc(e.quality||'Normal')}</span></div></div>`).join("")
    : `<div class="item">No separate effects yet.</div>`;
}
init();
</script>
</body></html>
